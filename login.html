<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Ride Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left-panel">

        <img src="image-12.webp" alt="Stackly Ride Logo">

        <h1>Stackly Ride</h1>

        <p>
            Safe, Fast & Affordable Taxi Service.
            Book rides anytime and travel comfortably.
        </p>

        <div class="store-buttons">
            <a href="404.html">
                <i class="fab fa-google-play"></i>
                Google Play
            </a>

            <a href="404.html">
                <i class="fab fa-apple"></i>
                App Store
            </a>
        </div>

    </div>

    <!-- Right Side -->
    <div class="form-container">

        <div class="form-box">

            <!-- Toggle Buttons -->
            <div class="button-box">
                <button id="loginBtn" type="button" class="active">Login</button>
                <button id="signupBtn" type="button">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">

                <h2>Welcome Back</h2>

                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Email"
                        required>
                </div>

                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Password"
                        required>
                </div>

                <p class="forgot-password">
                    <a href="404.html">Forgot Password?</a>
                </p>

                <button type="submit" class="submit-btn">
                    Login
                </button>

            </form>

            <!-- Signup Form -->
            <form id="signupForm">

                <h2>Create Account</h2>

                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input
                        type="text"
                        id="signupName"
                        placeholder="Full Name"
                        required>
                </div>

                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input
                        type="email"
                        id="signupEmail"
                        placeholder="Email"
                        required>
                </div>

                <div class="input-box">
                    <i class="fas fa-phone"></i>
                    <input
                        type="text"
                        id="signupPhone"
                        placeholder="Phone Number"
                        required>
                </div>

                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input
                        type="password"
                        id="signupPassword"
                        placeholder="Password"
                        required>
                </div>

                <button type="submit" class="submit-btn">
                    Sign Up
                </button>

            </form>

        </div>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
