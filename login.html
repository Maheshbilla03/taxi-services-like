<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Ride Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->

    <div class="left-panel">

        <img src="image-12.webp" alt="Stackly Ride Logo">

        <h1>Stackly Ride</h1>

        <p>
            Safe, Fast & Affordable Taxi Service.
            Book rides anytime and travel comfortably.
        </p>

        <div class="store-buttons">
            <a href="404.html">
                <i class="fab fa-google-play"></i>
                Google Play
            </a>

            <a href="404.html">
                <i class="fab fa-apple"></i>
                App Store
            </a>
        </div>

    </div>

    <!-- Right Side -->

    <div class="form-container">

        <div class="form-box">

            <div class="button-box">
                <button id="loginBtn">Login</button>
                <button id="signupBtn">Sign Up</button>
            </div>

            <!-- Login -->

            <form id="loginForm">
            

                <h2>Welcome Back</h2>

                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email">
                </div>

                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password">
                </div>

                <p class="forgot-password">
                    <a href="404.html">Forgot Password?</a>
                    </p>

                <button type="button" class="submit-btn" onclick="window.location.href='dashboard.html'">
    Login
</button>

            </form>

            <!-- Signup -->

            <form id="signupForm">

                <h2>Create Account</h2>

                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name">
                </div>

                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email">
                </div>

                <div class="input-box">
                    <i class="fas fa-phone"></i>
                    <input type="text" placeholder="Phone Number">
                </div>

                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password">
                </div>

                <button type="submit" class="submit-btn">
                    Sign Up
                </button>

            </form>

        </div>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
